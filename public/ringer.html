<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Ringer</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background: #0a0a0a;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    main {
      position: relative;
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
    }
    .health {
      position: absolute;
      top: max(24px, env(safe-area-inset-top));
      left: 20px;
      right: 20px;
      color: #fde68a;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .18em;
      text-align: center;
    }
    .health.ok {
      color: #86efac;
    }
    button {
      border: 1px solid #aaa;
      background: transparent;
      color: #eee;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    button:hover:not(:disabled) {
      border-color: #fff;
      background: rgba(255, 255, 255, .08);
    }
    button:disabled { opacity: .5; cursor: default; }
    button:active:not(:disabled) { transform: scale(.97); }
    #ringBtn {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(62vw, 270px);
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      padding: 22px;
      border-color: #777;
      border-radius: 50%;
      color: #eee;
      font-size: clamp(15px, 4.5vw, 20px);
      line-height: 1.35;
    }
    #ringBtn:hover:not(:disabled) { border-color: #fff; }
    #ringBtn:active:not(:disabled) { transform: translate(-50%, -50%) scale(.97); }
    #restartBtn {
      position: absolute;
      left: 50%;
      bottom: max(24px, env(safe-area-inset-bottom));
      width: min(320px, calc(100% - 48px));
      min-height: 48px;
      padding: 10px 18px;
      transform: translateX(-50%);
      border-color: #555;
      border-radius: 0;
      color: #999;
    }
    #restartBtn:active:not(:disabled) { transform: translateX(-50%) scale(.97); }
    .status {
      position: absolute;
      top: calc(50% + min(36vw, 155px));
      left: 24px;
      right: 24px;
      min-height: 16px;
      color: #555;
      font-size: 10px;
      letter-spacing: .04em;
      line-height: 1.4;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <div id="healthStatus" class="health">RESTART PHONE</div>
    <button id="ringBtn">Ring the Phone</button>
    <button id="restartBtn">Restart Phone</button>
    <div id="status" class="status">Checking phone...</div>
  </main>

  <script>
    const HEALTH_STALE_AFTER_MS = 40 * 60 * 1000;
    const healthStatus = document.getElementById('healthStatus');
    const ringBtn = document.getElementById('ringBtn');
    const restartBtn = document.getElementById('restartBtn');
    const statusEl = document.getElementById('status');
    let sourceConnected = false;
    let lastHealth = null;
    let ws = null;

    function setStatus(message) { statusEl.textContent = message; }

    function renderHealth() {
      const timestamp = lastHealth ? new Date(lastHealth.at).getTime() : NaN;
      const stale = Number.isNaN(timestamp) || Date.now() - timestamp > HEALTH_STALE_AFTER_MS;
      const ok = sourceConnected && !stale && lastHealth?.type === 'health' && lastHealth.ok;
      healthStatus.textContent = ok ? 'HEALTH: OK' : 'RESTART PHONE';
      healthStatus.classList.toggle('ok', ok);
      if (ok) setStatus(`Last test: ${new Date(lastHealth.at).toLocaleString()}`);
      else if (!sourceConnected) setStatus('Phone is offline');
      else if (lastHealth) setStatus(lastHealth.message || 'Health test failed or expired');
      else setStatus('No health test result');
    }

    async function loadHealth() {
      try {
        const response = await fetch('/health', { cache: 'no-store' });
        const data = await response.json();
        sourceConnected = !!data.sourceConnected;
        lastHealth = data.currentHealthState || null;
      } catch {
        sourceConnected = false;
      }
      renderHealth();
    }

    function connectStatus() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}/ws?role=listener`);
      ws.onmessage = event => {
        let message;
        try { message = JSON.parse(event.data); } catch { return; }
        if (message.type === 'ready') sourceConnected = !!message.sourceConnected;
        else if (message.type === 'source_status') sourceConnected = !!message.connected;
        else if ((message.type === 'health' || message.type === 'warning') && message.kind === 'test') lastHealth = message;
        else return;
        renderHealth();
      };
      ws.onclose = () => {
        sourceConnected = false;
        renderHealth();
        setTimeout(connectStatus, 5000);
      };
    }

    async function ringPhone() {
      ringBtn.disabled = true;
      ringBtn.textContent = 'Ringing...';
      setStatus('Sending ring command...');
      try {
        const response = await fetch('/ring', { method: 'POST' });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || `HTTP ${response.status}`);
        setStatus(result.message || 'Phone rang');
      } catch (error) {
        setStatus(`Ring failed: ${error.message}`);
      } finally {
        ringBtn.disabled = false;
        ringBtn.textContent = 'Ring the Phone';
      }
    }

    async function restartPhone() {
      if (!confirm('Restart the Raspberry Pi phone now?')) return;
      restartBtn.disabled = true;
      restartBtn.textContent = 'Restarting...';
      setStatus('Sending restart command...');
      try {
        const response = await fetch('/restart', { method: 'POST' });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || `HTTP ${response.status}`);
        sourceConnected = false;
        renderHealth();
        setStatus(result.message || 'Restart accepted');
      } catch (error) {
        setStatus(`Restart failed: ${error.message}`);
      } finally {
        setTimeout(() => {
          restartBtn.disabled = false;
          restartBtn.textContent = 'Restart Phone';
        }, 15000);
      }
    }

    ringBtn.addEventListener('click', ringPhone);
    restartBtn.addEventListener('click', restartPhone);
    loadHealth();
    connectStatus();
    setInterval(renderHealth, 30000);
  </script>
</body>
</html>
