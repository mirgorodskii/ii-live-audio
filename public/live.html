<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Listener</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    main {
      width: min(720px, 100%);
      display: grid;
      gap: 18px;
    }
    .panel {
      border: 1px solid #333;
      background: #1c1c1c;
      border-radius: 8px;
      padding: 18px;
      display: grid;
      gap: 14px;
    }
    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    button {
      border: 1px solid #aaa;
      border-radius: 6px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 650;
      cursor: pointer;
      background: transparent;
      color: #eee;
      transition: background 120ms ease, border-color 120ms ease;
    }
    button:hover:not(:disabled) {
      border-color: #fff;
      background: rgba(255, 255, 255, .08);
    }
    button:disabled {
      opacity: .5;
      cursor: default;
    }
    #ringBtn {
      border-color: #22c55e;
      color: #86efac;
    }
    .status {
      color: #bbb;
      font-size: 14px;
    }
    .warning {
      display: none;
      border: 1px solid #f59e0b;
      background: #2a1d05;
      color: #fde68a;
      border-radius: 8px;
      padding: 14px;
      font-size: 14px;
      line-height: 1.4;
    }
    .warning strong {
      display: block;
      color: #fbbf24;
      margin-bottom: 4px;
    }
    .health {
      color: #bbb;
      font-size: 14px;
      line-height: 1.4;
    }
    .health.ok { color: #86efac; }
    .health.warning { color: #fde68a; }
    .meter {
      display: grid;
      gap: 6px;
    }
    .meter header {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #bbb;
    }
    .bar {
      height: 12px;
      border-radius: 999px;
      background: #333;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      width: 0%;
      background: #d8d8d8;
      transition: width 80ms linear;
    }
    .assistant .fill { background: #7dd3fc; }
    .user .fill { background: #fbbf24; }
    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: #bbb;
    }
    input[type="range"] {
      width: 220px;
    }
    select {
      min-width: 220px;
      border: 1px solid #666;
      border-radius: 6px;
      padding: 10px 12px;
      background: #171717;
      color: #eee;
      font-size: 14px;
    }
    .secret-hotspot {
      position: fixed;
      z-index: 20;
      top: 0;
      right: 0;
      width: 72px;
      height: 72px;
      padding: 0;
      opacity: 0;
      background: transparent;
      border: 0;
    }
    .secret-panel {
      position: fixed;
      z-index: 30;
      top: 16px;
      right: 16px;
      width: min(620px, calc(100vw - 32px));
      max-height: calc(100vh - 32px);
      overflow: auto;
      display: none;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 18px;
      background: #171717;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .7);
    }
    .secret-panel.open { display: grid; gap: 16px; }
    .secret-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .secret-header h2 { margin: 0; font-size: 20px; }
    .secret-header button { padding: 8px 12px; }
    .audio-settings {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .audio-channel {
      display: grid;
      gap: 12px;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 14px;
      background: #202020;
    }
    .audio-channel h3 { margin: 0; font-size: 16px; }
    .audio-channel input[type="range"] { width: 100%; }
    @media (max-width: 620px) {
      .audio-settings { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <button id="secretHotspot" class="secret-hotspot" aria-label="Open audio settings"></button>

  <aside id="secretPanel" class="secret-panel" aria-hidden="true">
    <div class="secret-header">
      <h2>Audio Settings</h2>
      <button id="secretCloseBtn">Close</button>
    </div>
    <div class="audio-settings">
      <section class="audio-channel assistant">
        <h3>Assistant</h3>
        <label>Volume: <span id="assistantVolumeValue">100%</span>
          <input id="assistantVolume" type="range" min="0" max="150" value="100">
        </label>
        <div class="meter assistant">
          <header><span>Loudness</span><span id="assistantLevel">0.000</span></header>
          <div class="bar"><div class="fill" id="assistantFill"></div></div>
        </div>
      </section>
      <section class="audio-channel user">
        <h3>Human</h3>
        <label>Volume: <span id="userVolumeValue">100%</span>
          <input id="userVolume" type="range" min="0" max="150" value="100">
        </label>
        <div class="meter user">
          <header><span>Loudness</span><span id="userLevel">0.000</span></header>
          <div class="bar"><div class="fill" id="userFill"></div></div>
        </div>
      </section>
    </div>
  </aside>

  <main>
    <section class="panel">
      <div class="row">
        <button id="startBtn">Start</button>
        <button id="healthOnlyBtn">View Health Status Only</button>
        <button id="ringBtn">Ring Phone Speaker</button>
        <div class="status" id="status">Disconnected</div>
      </div>

      <div class="warning" id="warningBox">
        <strong>Warning</strong>
        <span id="warningText">Something is wrong.</span>
      </div>

      <div class="health" id="healthStatus">Health: no check yet</div>

      <div class="row">
        <label>
          Ring loudness: <span id="ringVolumeValue">75%</span>
          <input id="ringVolume" type="range" min="0" max="100" value="75">
        </label>
      </div>

      <div class="row">
        <label>
          Default scenario
          <select id="defaultScenarioSelect">
            <option value="0">1. The Phone</option><option value="1">2. The Elevator</option>
            <option value="2">3. The Mirror</option><option value="3">4. The Basement</option>
            <option value="4">5. The Forest</option><option value="5">6. The Hospital</option>
            <option value="6">7. The Doll</option><option value="7">8. The Broadcast</option>
            <option value="8">9. The Shadow</option><option value="9">10. The Dream</option>
          </select>
        </label>
        <label>
          Current scenario
          <select id="currentScenarioSelect">
            <option value="0">1. The Phone</option><option value="1">2. The Elevator</option>
            <option value="2">3. The Mirror</option><option value="3">4. The Basement</option>
            <option value="4">5. The Forest</option><option value="5">6. The Hospital</option>
            <option value="6">7. The Doll</option><option value="7">8. The Broadcast</option>
            <option value="8">9. The Shadow</option><option value="9">10. The Dream</option>
          </select>
        </label>
      </div>
    </section>

  </main>

  <script>
    const startBtn = document.getElementById('startBtn');
    const healthOnlyBtn = document.getElementById('healthOnlyBtn');
    const ringBtn = document.getElementById('ringBtn');
    const ringVolume = document.getElementById('ringVolume');
    const ringVolumeValue = document.getElementById('ringVolumeValue');
    const defaultScenarioSelect = document.getElementById('defaultScenarioSelect');
    const currentScenarioSelect = document.getElementById('currentScenarioSelect');
    const secretHotspot = document.getElementById('secretHotspot');
    const secretPanel = document.getElementById('secretPanel');
    const secretCloseBtn = document.getElementById('secretCloseBtn');
    const statusEl = document.getElementById('status');
    const assistantVolume = document.getElementById('assistantVolume');
    const userVolume = document.getElementById('userVolume');
    const assistantVolumeValue = document.getElementById('assistantVolumeValue');
    const userVolumeValue = document.getElementById('userVolumeValue');
    const assistantLevel = document.getElementById('assistantLevel');
    const userLevel = document.getElementById('userLevel');
    const assistantFill = document.getElementById('assistantFill');
    const userFill = document.getElementById('userFill');
    const warningBox = document.getElementById('warningBox');
    const warningText = document.getElementById('warningText');
    const healthStatus = document.getElementById('healthStatus');

    let ws = null;
    let audioContext = null;
    let audioEnabled = false;
    let lastHealth = null;
    let sourceConnected = false;
    let ringVolumeTimer = null;
    let lastScenarioState = null;
    const pendingListenerMessages = [];
    const HEALTH_STALE_AFTER_MS = 40 * 60 * 1000;
    const MAX_PLAYBACK_BACKLOG_SECONDS = 2;
    const channels = {
      assistant: { nextTime: 0, gain: null, sources: new Set() },
      user: { nextTime: 0, gain: null, sources: new Set() }
    };

    function setSecretPanel(open) {
      secretPanel.classList.toggle('open', open);
      secretPanel.setAttribute('aria-hidden', String(!open));
    }

    function settingKey(channel, setting) {
      return `listenerAudio.${channel}.${setting}`;
    }

    function readSavedNumber(key, fallback, min, max) {
      try {
        const saved = localStorage.getItem(key);
        if (saved === null) return fallback;
        const value = Number(saved);
        return Number.isFinite(value) && value >= min && value <= max ? value : fallback;
      } catch {
        return fallback;
      }
    }

    function saveAudioSetting(key, value) {
      try { localStorage.setItem(key, String(value)); } catch {}
    }

    function updateVolume(channelName) {
      const input = channelName === 'assistant' ? assistantVolume : userVolume;
      const value = channelName === 'assistant' ? assistantVolumeValue : userVolumeValue;
      const level = Number(input.value);
      value.textContent = `${level}%`;
      saveAudioSetting(settingKey(channelName, 'volume'), level);
      if (channels[channelName].gain) channels[channelName].gain.gain.value = level / 100;
    }

    function loadAudioSettings() {
      assistantVolume.value = String(readSavedNumber(settingKey('assistant', 'volume'), 100, 0, 150));
      userVolume.value = String(readSavedNumber(settingKey('user', 'volume'), 100, 0, 150));
      assistantVolumeValue.textContent = `${assistantVolume.value}%`;
      userVolumeValue.textContent = `${userVolume.value}%`;
    }

    function createChannelAudioGraph(channelName) {
      const state = channels[channelName];
      state.gain = audioContext.createGain();
      state.gain.connect(audioContext.destination);

      const volume = channelName === 'assistant' ? assistantVolume : userVolume;
      state.gain.gain.value = Number(volume.value) / 100;
    }

    function wsUrl() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      return `${proto}//${location.host}/ws?role=listener`;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function formatDateTime(at) {
      if (!at) return 'unknown time';
      const date = new Date(at);
      return Number.isNaN(date.getTime()) ? 'unknown time' : date.toLocaleString();
    }

    function formatAge(at) {
      const timestamp = new Date(at).getTime();
      if (!at || Number.isNaN(timestamp)) return 'unknown age';
      const elapsed = Math.max(0, Date.now() - timestamp);
      const minutes = Math.floor(elapsed / 60000);
      if (minutes < 1) return 'just now';
      if (minutes < 60) return `${minutes} minute${minutes === 1 ? '' : 's'} ago`;
      const hours = Math.floor(minutes / 60);
      return `${hours} hour${hours === 1 ? '' : 's'} ago`;
    }

    function renderHealth() {
      if (!lastHealth) return;
      const time = formatDateTime(lastHealth.at);
      const age = formatAge(lastHealth.at);
      const healthTimestamp = new Date(lastHealth.at).getTime();
      const stale = !sourceConnected || Number.isNaN(healthTimestamp) || Date.now() - healthTimestamp > HEALTH_STALE_AFTER_MS;
      const ok = lastHealth.type === 'health' && lastHealth.ok && !stale;
      const message = stale
        ? `Last result from ${time} is stale (${age}) - ${lastHealth.message}`
        : `Tested at ${time} (${age}) - ${lastHealth.message}`;

      if (ok) {
        warningBox.style.display = 'none';
        healthStatus.textContent = `Health: ok - ${message}`;
        healthStatus.className = 'health ok';
      } else {
        warningText.textContent = message;
        warningBox.style.display = 'block';
        healthStatus.textContent = `Health: warning - ${message}`;
        healthStatus.className = 'health warning';
      }
    }

    function showWarning(message, at) {
      const time = formatDateTime(at);
      warningText.textContent = `${time}: ${message}`;
      warningBox.style.display = 'block';
      healthStatus.textContent = `Health: warning at ${time} - ${message}`;
      healthStatus.className = 'health warning';
    }

    function clearWarning(message, at) {
      warningBox.style.display = 'none';
      if (message) {
        const time = formatDateTime(at);
        setStatus(message);
        healthStatus.textContent = `Health: ok at ${time} - ${message}`;
        healthStatus.className = 'health ok';
      }
    }

    function base64ToBytes(b64) {
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }

    function rms(samples) {
      let sum = 0;
      for (let i = 0; i < samples.length; i++) sum += samples[i] * samples[i];
      return Math.sqrt(sum / Math.max(1, samples.length));
    }

    function updateMeter(channel, level) {
      const label = channel === 'assistant' ? assistantLevel : userLevel;
      const fill = channel === 'assistant' ? assistantFill : userFill;
      label.textContent = level.toFixed(3);
      fill.style.width = `${Math.min(100, level * 500)}%`;
    }

    function playPcm16(channelName, b64, sampleRate) {
      if (!audioEnabled) return;
      const state = channels[channelName];
      if (!state || !audioContext) return;

      const bytes = base64ToBytes(b64);
      const sampleCount = Math.floor(bytes.length / 2);
      if (!sampleCount) return;

      const buffer = audioContext.createBuffer(1, sampleCount, sampleRate || 24000);
      const data = buffer.getChannelData(0);
      const view = new DataView(bytes.buffer);
      for (let i = 0; i < sampleCount; i++) {
        data[i] = view.getInt16(i * 2, true) / 32768;
      }

      updateMeter(channelName, rms(data));

      const source = audioContext.createBufferSource();
      source.buffer = buffer;
      source.connect(state.gain);

      const backlog = Math.max(0, (state.nextTime || 0) - audioContext.currentTime);
      if (backlog > MAX_PLAYBACK_BACKLOG_SECONDS) {
        for (const queuedSource of state.sources) {
          try { queuedSource.stop(); } catch {}
        }
        state.sources.clear();
        state.nextTime = audioContext.currentTime + 0.04;
        setStatus('Live (dropped delayed audio)');
      } else if (backlog > 0.5) {
        source.playbackRate.value = 1.08;
      }

      const startAt = Math.max(audioContext.currentTime + 0.08, state.nextTime || 0);
      source.start(startAt);
      state.nextTime = startAt + (buffer.duration / source.playbackRate.value);
      state.sources.add(source);
      source.onended = () => state.sources.delete(source);
    }

    async function ringUsbSpeaker() {
      ringBtn.disabled = true;
      ringBtn.textContent = 'Ringing...';
      setStatus('Sending ring command to Raspberry Pi...');
      try {
        const response = await fetch('/ring', { method: 'POST' });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || `HTTP ${response.status}`);
        setStatus(result.message || 'Phone speaker rang');
      } catch (error) {
        setStatus(`Ring failed: ${error.message}`);
      } finally {
        ringBtn.disabled = false;
        ringBtn.textContent = 'Ring Phone Speaker';
      }
    }

    async function saveRingVolume() {
      const level = Number(ringVolume.value);
      ringVolumeValue.textContent = `${level}%`;
      try { localStorage.setItem('phoneRingVolume', String(level)); } catch {}
      try {
        const response = await fetch('/ring/volume', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ level })
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || `HTTP ${response.status}`);
        setStatus(`Ring loudness set to ${level}%`);
      } catch (error) {
        setStatus(`Ring volume failed: ${error.message}`);
      }
    }

    function scheduleRingVolumeUpdate() {
      ringVolumeValue.textContent = `${ringVolume.value}%`;
      clearTimeout(ringVolumeTimer);
      ringVolumeTimer = setTimeout(saveRingVolume, 250);
    }

    function applyScenarioState(state) {
      lastScenarioState = state;
      if (Array.isArray(state.scenarios)) {
        for (const select of [defaultScenarioSelect, currentScenarioSelect]) {
          for (const scenario of state.scenarios) {
            const option = select.querySelector(`option[value="${scenario.index}"]`);
            if (option && scenario.label) option.textContent = scenario.label;
          }
        }
      }
      if (Number.isInteger(state.defaultIndex)) defaultScenarioSelect.value = String(state.defaultIndex);
      if (Number.isInteger(state.currentIndex)) currentScenarioSelect.value = String(state.currentIndex);
    }

    function sendListenerMessage(message) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(message));
        return;
      }
      pendingListenerMessages.push(message);
      if (!ws || ws.readyState === WebSocket.CLOSED) {
        connectListener({ enableAudio: false });
      }
    }

    function changeRemoteScenario(mode, select) {
      const index = Number(select.value);
      setStatus(`Changing ${mode} scenario...`);
      sendListenerMessage({ type: 'scenario_control', mode, index });
    }

    function handleMessage(event) {
      let msg;
      try {
        msg = JSON.parse(event.data);
      } catch {
        return;
      }

      if (msg.type === 'ready') {
        sourceConnected = !!msg.sourceConnected;
        setStatus(msg.sourceConnected ? 'Live' : 'Connected. Phone not streaming.');
        renderHealth();
        return;
      }

      if (msg.type === 'source_status') {
        sourceConnected = !!msg.connected;
        setStatus(msg.connected ? 'Live' : 'Phone disconnected');
        renderHealth();
        return;
      }

      if (msg.type === 'scenario_state') {
        applyScenarioState(msg);
        return;
      }

      if (msg.type === 'scenario_control_result') {
        setStatus(msg.message || (msg.ok ? 'Scenario updated' : 'Scenario change failed'));
        if (!msg.ok && lastScenarioState) applyScenarioState(lastScenarioState);
        return;
      }

      if (msg.type === 'warning') {
        if (msg.kind === 'test') {
          lastHealth = msg;
          renderHealth();
        } else {
          showWarning(msg.message || 'Phone status warning', msg.at);
        }
        return;
      }

      if (msg.type === 'health') {
        if (msg.kind === 'test') {
          lastHealth = msg;
          renderHealth();
        } else {
          setStatus(msg.message || 'Phone status ok');
        }
        return;
      }

      if (msg.type === 'audio') {
        playPcm16(msg.channel, msg.audio, msg.sampleRate);
      }
    }

    function connectListener({ enableAudio }) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        audioEnabled = enableAudio;
        startBtn.disabled = false;
        healthOnlyBtn.disabled = false;
        setStatus(enableAudio ? 'Live' : 'Health only');
        return;
      }
      if (ws && ws.readyState === WebSocket.CONNECTING) {
        audioEnabled = enableAudio;
        return;
      }

      startBtn.disabled = true;
      healthOnlyBtn.disabled = true;
      audioEnabled = enableAudio;

      ws = new WebSocket(wsUrl());
      ws.onopen = () => {
        startBtn.disabled = false;
        healthOnlyBtn.disabled = false;
        setStatus(audioEnabled ? 'Connected. Waiting for phone audio...' : 'Connected. Health only.');
        while (pendingListenerMessages.length) {
          ws.send(JSON.stringify(pendingListenerMessages.shift()));
        }
      };
      ws.onclose = () => {
        setStatus('Disconnected');
        startBtn.disabled = false;
        healthOnlyBtn.disabled = false;
        audioEnabled = false;
      };
      ws.onerror = () => setStatus('Connection error');
      ws.onmessage = handleMessage;
    }

    function stopAudioPlayback() {
      audioEnabled = false;
      if (audioContext) {
        audioContext.close().catch(() => {});
        audioContext = null;
      }
      channels.assistant.nextTime = 0;
      channels.assistant.gain = null;
      channels.assistant.sources.clear();
      channels.user.nextTime = 0;
      channels.user.gain = null;
      channels.user.sources.clear();
      updateMeter('assistant', 0);
      updateMeter('user', 0);
    }

    async function start() {
      if (audioEnabled) return;
      if (!audioContext || audioContext.state === 'closed') {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === 'suspended') await audioContext.resume();

      createChannelAudioGraph('assistant');
      createChannelAudioGraph('user');

      connectListener({ enableAudio: true });
    }

    function checkHealthOnly() {
      stopAudioPlayback();
      connectListener({ enableAudio: false });
    }

    startBtn.addEventListener('click', start);
    healthOnlyBtn.addEventListener('click', checkHealthOnly);
    ringBtn.addEventListener('click', ringUsbSpeaker);
    defaultScenarioSelect.addEventListener('change', () => changeRemoteScenario('default', defaultScenarioSelect));
    currentScenarioSelect.addEventListener('change', () => changeRemoteScenario('current', currentScenarioSelect));
    secretHotspot.addEventListener('click', () => setSecretPanel(true));
    secretCloseBtn.addEventListener('click', () => setSecretPanel(false));
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') setSecretPanel(false);
    });
    assistantVolume.addEventListener('input', () => updateVolume('assistant'));
    userVolume.addEventListener('input', () => updateVolume('user'));
    loadAudioSettings();
    try {
      const savedRingVolume = localStorage.getItem('phoneRingVolume');
      if (savedRingVolume !== null) {
        const level = Number(savedRingVolume);
        if (Number.isInteger(level) && level >= 0 && level <= 100) {
          ringVolume.value = String(level);
          ringVolumeValue.textContent = `${level}%`;
        }
      }
    } catch {}
    ringVolume.addEventListener('input', scheduleRingVolumeUpdate);
    setInterval(renderHealth, 30000);
  </script>
</body>
</html>
