<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Phone Live Audio</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    main {
      width: min(720px, 100%);
      display: grid;
      gap: 18px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 650;
    }
    .panel {
      border: 1px solid #333;
      background: #1c1c1c;
      border-radius: 8px;
      padding: 18px;
      display: grid;
      gap: 14px;
    }
    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 6px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 650;
      cursor: pointer;
      background: #f0f0f0;
      color: #111;
    }
    button:disabled {
      opacity: .5;
      cursor: default;
    }
    #ringBtn {
      background: #22c55e;
      color: #071b0d;
    }
    .status {
      color: #bbb;
      font-size: 14px;
    }
    .warning {
      display: none;
      border: 1px solid #f59e0b;
      background: #2a1d05;
      color: #fde68a;
      border-radius: 8px;
      padding: 14px;
      font-size: 14px;
      line-height: 1.4;
    }
    .warning strong {
      display: block;
      color: #fbbf24;
      margin-bottom: 4px;
    }
    .health {
      color: #bbb;
      font-size: 14px;
      line-height: 1.4;
    }
    .health.ok { color: #86efac; }
    .health.warning { color: #fde68a; }
    .meters {
      display: grid;
      gap: 12px;
    }
    .meter {
      display: grid;
      gap: 6px;
    }
    .meter header {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #bbb;
    }
    .bar {
      height: 12px;
      border-radius: 999px;
      background: #333;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      width: 0%;
      background: #d8d8d8;
      transition: width 80ms linear;
    }
    .assistant .fill { background: #7dd3fc; }
    .user .fill { background: #fbbf24; }
    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: #bbb;
    }
    input[type="range"] {
      width: 220px;
    }
  </style>
</head>
<body>
  <main>
    <h1>The Phone Live Audio</h1>

    <section class="panel">
      <div class="row">
        <button id="startBtn">Start Listening</button>
        <button id="healthOnlyBtn">View Health Status Only</button>
        <button id="ringBtn">Ring Phone Speaker</button>
        <div class="status" id="status">Disconnected</div>
      </div>

      <div class="warning" id="warningBox">
        <strong>Warning</strong>
        <span id="warningText">Something is wrong.</span>
      </div>

      <div class="health" id="healthStatus">Health: no check yet</div>

      <div class="row">
        <label>
          Assistant volume
          <input id="assistantVolume" type="range" min="0" max="150" value="100">
        </label>
        <label>
          Human volume
          <input id="userVolume" type="range" min="0" max="150" value="100">
        </label>
      </div>
    </section>

    <section class="panel meters">
      <div class="meter assistant">
        <header><span>Assistant</span><span id="assistantLevel">0.000</span></header>
        <div class="bar"><div class="fill" id="assistantFill"></div></div>
      </div>
      <div class="meter user">
        <header><span>Human</span><span id="userLevel">0.000</span></header>
        <div class="bar"><div class="fill" id="userFill"></div></div>
      </div>
    </section>
  </main>

  <script>
    const startBtn = document.getElementById('startBtn');
    const healthOnlyBtn = document.getElementById('healthOnlyBtn');
    const ringBtn = document.getElementById('ringBtn');
    const statusEl = document.getElementById('status');
    const assistantVolume = document.getElementById('assistantVolume');
    const userVolume = document.getElementById('userVolume');
    const assistantLevel = document.getElementById('assistantLevel');
    const userLevel = document.getElementById('userLevel');
    const assistantFill = document.getElementById('assistantFill');
    const userFill = document.getElementById('userFill');
    const warningBox = document.getElementById('warningBox');
    const warningText = document.getElementById('warningText');
    const healthStatus = document.getElementById('healthStatus');

    let ws = null;
    let audioContext = null;
    let audioEnabled = false;
    let volumeHandlersAttached = false;
    let lastHealth = null;
    let sourceConnected = false;
    const HEALTH_STALE_AFTER_MS = 40 * 60 * 1000;
    const MAX_PLAYBACK_BACKLOG_SECONDS = 2;
    const channels = {
      assistant: { nextTime: 0, gain: null, sources: new Set() },
      user: { nextTime: 0, gain: null, sources: new Set() }
    };

    function wsUrl() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      return `${proto}//${location.host}/ws?role=listener`;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function formatDateTime(at) {
      if (!at) return 'unknown time';
      const date = new Date(at);
      return Number.isNaN(date.getTime()) ? 'unknown time' : date.toLocaleString();
    }

    function formatAge(at) {
      const timestamp = new Date(at).getTime();
      if (!at || Number.isNaN(timestamp)) return 'unknown age';
      const elapsed = Math.max(0, Date.now() - timestamp);
      const minutes = Math.floor(elapsed / 60000);
      if (minutes < 1) return 'just now';
      if (minutes < 60) return `${minutes} minute${minutes === 1 ? '' : 's'} ago`;
      const hours = Math.floor(minutes / 60);
      return `${hours} hour${hours === 1 ? '' : 's'} ago`;
    }

    function renderHealth() {
      if (!lastHealth) return;
      const time = formatDateTime(lastHealth.at);
      const age = formatAge(lastHealth.at);
      const healthTimestamp = new Date(lastHealth.at).getTime();
      const stale = !sourceConnected || Number.isNaN(healthTimestamp) || Date.now() - healthTimestamp > HEALTH_STALE_AFTER_MS;
      const ok = lastHealth.type === 'health' && lastHealth.ok && !stale;
      const message = stale
        ? `Last result from ${time} is stale (${age}) - ${lastHealth.message}`
        : `Tested at ${time} (${age}) - ${lastHealth.message}`;

      if (ok) {
        warningBox.style.display = 'none';
        healthStatus.textContent = `Health: ok - ${message}`;
        healthStatus.className = 'health ok';
      } else {
        warningText.textContent = message;
        warningBox.style.display = 'block';
        healthStatus.textContent = `Health: warning - ${message}`;
        healthStatus.className = 'health warning';
      }
    }

    function showWarning(message, at) {
      const time = formatDateTime(at);
      warningText.textContent = `${time}: ${message}`;
      warningBox.style.display = 'block';
      healthStatus.textContent = `Health: warning at ${time} - ${message}`;
      healthStatus.className = 'health warning';
    }

    function clearWarning(message, at) {
      warningBox.style.display = 'none';
      if (message) {
        const time = formatDateTime(at);
        setStatus(message);
        healthStatus.textContent = `Health: ok at ${time} - ${message}`;
        healthStatus.className = 'health ok';
      }
    }

    function base64ToBytes(b64) {
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }

    function rms(samples) {
      let sum = 0;
      for (let i = 0; i < samples.length; i++) sum += samples[i] * samples[i];
      return Math.sqrt(sum / Math.max(1, samples.length));
    }

    function updateMeter(channel, level) {
      const label = channel === 'assistant' ? assistantLevel : userLevel;
      const fill = channel === 'assistant' ? assistantFill : userFill;
      label.textContent = level.toFixed(3);
      fill.style.width = `${Math.min(100, level * 500)}%`;
    }

    function playPcm16(channelName, b64, sampleRate) {
      if (!audioEnabled) return;
      const state = channels[channelName];
      if (!state || !audioContext) return;

      const bytes = base64ToBytes(b64);
      const sampleCount = Math.floor(bytes.length / 2);
      if (!sampleCount) return;

      const buffer = audioContext.createBuffer(1, sampleCount, sampleRate || 24000);
      const data = buffer.getChannelData(0);
      const view = new DataView(bytes.buffer);
      for (let i = 0; i < sampleCount; i++) {
        data[i] = view.getInt16(i * 2, true) / 32768;
      }

      updateMeter(channelName, rms(data));

      const source = audioContext.createBufferSource();
      source.buffer = buffer;
      source.connect(state.gain);

      const backlog = Math.max(0, (state.nextTime || 0) - audioContext.currentTime);
      if (backlog > MAX_PLAYBACK_BACKLOG_SECONDS) {
        for (const queuedSource of state.sources) {
          try { queuedSource.stop(); } catch {}
        }
        state.sources.clear();
        state.nextTime = audioContext.currentTime + 0.04;
        setStatus('Live (dropped delayed audio)');
      } else if (backlog > 0.5) {
        source.playbackRate.value = 1.08;
      }

      const startAt = Math.max(audioContext.currentTime + 0.08, state.nextTime || 0);
      source.start(startAt);
      state.nextTime = startAt + (buffer.duration / source.playbackRate.value);
      state.sources.add(source);
      source.onended = () => state.sources.delete(source);
    }

    async function ringUsbSpeaker() {
      ringBtn.disabled = true;
      ringBtn.textContent = 'Ringing...';
      setStatus('Sending ring command to Raspberry Pi...');
      try {
        const response = await fetch('/ring', { method: 'POST' });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || `HTTP ${response.status}`);
        setStatus(result.message || 'Phone speaker rang');
      } catch (error) {
        setStatus(`Ring failed: ${error.message}`);
      } finally {
        ringBtn.disabled = false;
        ringBtn.textContent = 'Ring Phone Speaker';
      }
    }

    function handleMessage(event) {
      let msg;
      try {
        msg = JSON.parse(event.data);
      } catch {
        return;
      }

      if (msg.type === 'ready') {
        sourceConnected = !!msg.sourceConnected;
        setStatus(msg.sourceConnected ? 'Live' : 'Connected. Phone not streaming.');
        renderHealth();
        return;
      }

      if (msg.type === 'source_status') {
        sourceConnected = !!msg.connected;
        setStatus(msg.connected ? 'Live' : 'Phone disconnected');
        renderHealth();
        return;
      }

      if (msg.type === 'warning') {
        if (msg.kind === 'test') {
          lastHealth = msg;
          renderHealth();
        } else {
          showWarning(msg.message || 'Phone status warning', msg.at);
        }
        return;
      }

      if (msg.type === 'health') {
        if (msg.kind === 'test') {
          lastHealth = msg;
          renderHealth();
        } else {
          setStatus(msg.message || 'Phone status ok');
        }
        return;
      }

      if (msg.type === 'audio') {
        playPcm16(msg.channel, msg.audio, msg.sampleRate);
      }
    }

    function connectListener({ enableAudio }) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        audioEnabled = enableAudio;
        startBtn.disabled = false;
        healthOnlyBtn.disabled = false;
        setStatus(enableAudio ? 'Live' : 'Health only');
        return;
      }

      startBtn.disabled = true;
      healthOnlyBtn.disabled = true;
      audioEnabled = enableAudio;

      ws = new WebSocket(wsUrl());
      ws.onopen = () => {
        startBtn.disabled = false;
        healthOnlyBtn.disabled = false;
        setStatus(enableAudio ? 'Connected. Waiting for phone audio...' : 'Connected. Health only.');
      };
      ws.onclose = () => {
        setStatus('Disconnected');
        startBtn.disabled = false;
        healthOnlyBtn.disabled = false;
        audioEnabled = false;
      };
      ws.onerror = () => setStatus('Connection error');
      ws.onmessage = handleMessage;
    }

    function stopAudioPlayback() {
      audioEnabled = false;
      if (audioContext) {
        audioContext.close().catch(() => {});
        audioContext = null;
      }
      channels.assistant.nextTime = 0;
      channels.assistant.gain = null;
      channels.assistant.sources.clear();
      channels.user.nextTime = 0;
      channels.user.gain = null;
      channels.user.sources.clear();
      updateMeter('assistant', 0);
      updateMeter('user', 0);
    }

    async function start() {
      if (audioEnabled) return;
      if (!audioContext || audioContext.state === 'closed') {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === 'suspended') await audioContext.resume();

      channels.assistant.gain = audioContext.createGain();
      channels.user.gain = audioContext.createGain();
      channels.assistant.gain.connect(audioContext.destination);
      channels.user.gain.connect(audioContext.destination);
      channels.assistant.gain.gain.value = Number(assistantVolume.value) / 100;
      channels.user.gain.gain.value = Number(userVolume.value) / 100;

      if (!volumeHandlersAttached) {
        assistantVolume.addEventListener('input', () => {
          if (channels.assistant.gain) channels.assistant.gain.gain.value = Number(assistantVolume.value) / 100;
        });
        userVolume.addEventListener('input', () => {
          if (channels.user.gain) channels.user.gain.gain.value = Number(userVolume.value) / 100;
        });
        volumeHandlersAttached = true;
      }

      connectListener({ enableAudio: true });
    }

    function checkHealthOnly() {
      stopAudioPlayback();
      connectListener({ enableAudio: false });
    }

    startBtn.addEventListener('click', start);
    healthOnlyBtn.addEventListener('click', checkHealthOnly);
    ringBtn.addEventListener('click', ringUsbSpeaker);
    setInterval(renderHealth, 30000);
  </script>
</body>
</html>
